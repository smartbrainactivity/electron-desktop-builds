<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="electron-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#47848F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9FEAF9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#9FEAF9">
    <circle cx="50" cy="50" r="2"/><circle cx="100" cy="50" r="2"/><circle cx="150" cy="50" r="2"/>
    <circle cx="200" cy="50" r="2"/><circle cx="250" cy="50" r="2"/><circle cx="300" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/>
    <circle cx="200" cy="100" r="2"/><circle cx="250" cy="100" r="2"/><circle cx="300" cy="100" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/>
    <circle cx="900" cy="150" r="2"/><circle cx="950" cy="150" r="2"/><circle cx="1000" cy="150" r="2"/>
    <circle cx="1050" cy="150" r="2"/><circle cx="1100" cy="150" r="2"/><circle cx="1150" cy="150" r="2"/>
    <circle cx="900" cy="200" r="2"/><circle cx="950" cy="200" r="2"/><circle cx="1000" cy="200" r="2"/>
    <circle cx="1050" cy="200" r="2"/><circle cx="1100" cy="200" r="2"/><circle cx="1150" cy="200" r="2"/>
    <circle cx="900" cy="250" r="2"/><circle cx="950" cy="250" r="2"/><circle cx="1000" cy="250" r="2"/>
    <circle cx="1050" cy="250" r="2"/><circle cx="1100" cy="250" r="2"/><circle cx="1150" cy="250" r="2"/>
  </g>

  <!-- Electron atom icon -->
  <g transform="translate(150, 150)" filter="url(#glow)">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="12" fill="url(#electron-glow)"/>
    <!-- Orbit 1 -->
    <ellipse cx="0" cy="0" rx="65" ry="25" fill="none" stroke="#9FEAF9" stroke-width="2" opacity="0.7"/>
    <!-- Orbit 2 -->
    <ellipse cx="0" cy="0" rx="65" ry="25" fill="none" stroke="#9FEAF9" stroke-width="2" opacity="0.7" transform="rotate(60)"/>
    <!-- Orbit 3 -->
    <ellipse cx="0" cy="0" rx="65" ry="25" fill="none" stroke="#9FEAF9" stroke-width="2" opacity="0.7" transform="rotate(120)"/>
    <!-- Electrons -->
    <circle cx="65" cy="0" r="5" fill="#9FEAF9" opacity="0.9"/>
    <circle cx="-32" cy="22" r="5" fill="#9FEAF9" opacity="0.9"/>
    <circle cx="-32" cy="-22" r="5" fill="#9FEAF9" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="310" y="120" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
    Electron Desktop Builds
  </text>

  <!-- Subtitle -->
  <text x="310" y="160" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#9FEAF9" opacity="0.9">
    AI Skill for Planning, Configuring &amp; Troubleshooting
  </text>

  <!-- Platform tags -->
  <g transform="translate(310, 185)">
    <!-- Windows -->
    <rect x="0" y="0" width="95" height="28" rx="14" fill="#47848F" opacity="0.3"/>
    <text x="48" y="19" font-family="'Segoe UI', sans-serif" font-size="12" fill="#9FEAF9" text-anchor="middle">Windows</text>
    <!-- macOS -->
    <rect x="105" y="0" width="80" height="28" rx="14" fill="#47848F" opacity="0.3"/>
    <text x="145" y="19" font-family="'Segoe UI', sans-serif" font-size="12" fill="#9FEAF9" text-anchor="middle">macOS</text>
    <!-- Linux -->
    <rect x="195" y="0" width="75" height="28" rx="14" fill="#47848F" opacity="0.3"/>
    <text x="233" y="19" font-family="'Segoe UI', sans-serif" font-size="12" fill="#9FEAF9" text-anchor="middle">Linux</text>
    <!-- CI/CD -->
    <rect x="280" y="0" width="75" height="28" rx="14" fill="#47848F" opacity="0.3"/>
    <text x="318" y="19" font-family="'Segoe UI', sans-serif" font-size="12" fill="#9FEAF9" text-anchor="middle">CI/CD</text>
  </g>

  <!-- SMARTbrain Activity branding -->
  <text x="310" y="260" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" opacity="0.5">
    by SMARTbrain Activity
  </text>

  <!-- Decorative code bracket -->
  <g transform="translate(1050, 80)" opacity="0.15" fill="none" stroke="#9FEAF9" stroke-width="3">
    <path d="M0,0 L-25,50 L0,100"/>
    <path d="M60,0 L85,50 L60,100"/>
  </g>
</svg>
